<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>廻リ視 web compositor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>廻リ視 web compositor</h1>
      <div class="status-bar">
        <span id="stDot" class="st-dot off"></span>
        <span id="stInfo">Unity: 未接続</span>
        <span id="stSync" class="st-sync"></span>
        <span class="spacer"></span>
        <button id="openRecordings" title="撮影した画像・動画のフォルダ（recordings/）を開く">📂 撮影フォルダ</button>
        <button id="autoZone" title="カメラ手動固定を解除しゾーン自律へ戻す">🚶 ゾーン自律</button>
        <a href="sim.html" target="_blank" class="link" title="Unity なしで動作確認する仮想クライアント">🖥 仮想Quest</a>
      </div>
    </header>

    <section class="multicam">
      <div class="mc-title">
        マルチカメラ
        <span class="hint">列＝カメラ。各列は下→上に ① 生映像 → ② マスク → ③ 画像加工 → ④ Quest 実映像 の流れ。📷/⏺ は ① 生映像の上＝生フレーム、④ 実映像の上＝合成済み（Quest と同じ絵）を recordings/ へ。</span>
      </div>
      <div class="blend-bar">
        <span class="seg-label">境界ブレンド（合成跡を消す）</span>
        <label class="sld">フェザー <input id="bFeather" type="range" min="0" max="1" step="0.01" value="0.3"></label>
        <label class="chk"><input id="bColor" type="checkbox" checked> 色統計</label>
        <label class="sld">強度 <input id="bColorStr" type="range" min="0" max="1" step="0.01" value="1"></label>
        <label class="chk"><input id="bLap" type="checkbox" checked> ラプラシアン</label>
        <label class="sld">レベル <input id="bLevels" type="range" min="2" max="9" step="1" value="7"><span id="bLevelsV">7</span></label>
      </div>
      <div id="cams" class="cams"></div>
    </section>

    <section class="prompts">
      <div class="mc-title">生成プロンプト
        <span class="hint">画像/動画 AI 生成用。📋 でコピーして各ツールへ。PC（show.json と同じ）に保存。</span>
      </div>
      <div class="prompt-add">
        <div class="row-btns">
          <label class="chk"><input type="radio" name="pkind" value="image" checked> 🖼 画像</label>
          <label class="chk"><input type="radio" name="pkind" value="video"> 🎬 動画</label>
          <input id="pTitle" type="text" placeholder="タイトル（任意）">
        </div>
        <textarea id="pText" rows="3" placeholder="プロンプト本文を貼り付け / 入力…"></textarea>
        <div class="row-btns"><button id="pSave" class="accent">＋ 保存 / 更新</button></div>
      </div>
      <div id="promptList" class="prompt-list"></div>
    </section>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
