<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>廻リ視 web compositor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>廻リ視 web compositor</h1>
      <div class="status-bar">
        <span id="stDot" class="st-dot off"></span>
        <span id="stInfo">Unity: 未接続</span>
        <span id="stSync" class="st-sync"></span>
        <span class="spacer"></span>
        <button id="openRecordings" title="撮影した画像・動画のフォルダ（recordings/）を開く">📂 撮影フォルダ</button>
        <button id="autoZone" title="カメラ手動固定を解除しゾーン自律へ戻す">🚶 ゾーン自律</button>
        <a href="sim.html" target="_blank" class="link" title="Unity なしで動作確認する仮想クライアント">🖥 仮想Quest</a>
      </div>
    </header>

    <section class="multicam">
      <div class="mc-title">
        マルチカメラ
        <span class="hint">列＝カメラ。設定・マスク・合成素材はすべて show.json に保存され、Quest 実機が起動時キャッシュ＋ライブで参照する。ビューは画質を当てた最終見た目（Quest と同じ絵）。</span>
      </div>
      <div id="cams" class="cams"></div>
    </section>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
