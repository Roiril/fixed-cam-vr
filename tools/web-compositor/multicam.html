<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>📡 マルチカメラビュー — fixed-cam-vr</title>
<style>
  /* デザイン言語: cogni-storage 準拠（style.css と同トークン） */
  :root {
    color-scheme: dark;
    --bg-color: #000000;
    --text-color: #fffaf0;
    --accent-color: #ffdead;
    --line-soft: rgba(255, 250, 240, 0.18);
    --line-input: rgba(255, 250, 240, 0.3);
    --danger-color: #ff6b5e;
    --opacity-mute: 0.55;
    --opacity-sub: 0.75;
  }
  body {
    margin: 0; color: var(--text-color);
    background: radial-gradient(circle at top left, #1a1a1a 0%, var(--bg-color) 100%) fixed;
    font: 13px/1.55 "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    animation: fadeIn .5s ease-out;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  header {
    display: flex; align-items: center; gap: 12px 16px; flex-wrap: wrap;
    padding: 14px 20px 12px; border-bottom: 1px solid var(--line-soft);
  }
  header h1 {
    font-size: 15px; margin: 0; font-weight: 600; letter-spacing: .12em;
    border-bottom: 2px solid var(--accent-color); padding-bottom: 2px; white-space: nowrap;
  }
  header .hint { opacity: var(--opacity-mute); font-size: 11px; }
  button {
    background: transparent; color: var(--text-color);
    border: 1px solid var(--line-soft); border-radius: 0;
    padding: 4px 10px; font-size: 12px; cursor: pointer; font-family: inherit;
    opacity: var(--opacity-sub); transition: color .15s ease, border-color .15s ease;
    white-space: nowrap;
  }
  button:hover { color: var(--accent-color); border-color: var(--accent-color); opacity: 1; }
  button.on { color: var(--accent-color); border-color: var(--accent-color); opacity: 1;
              box-shadow: inset 0 0 0 1px var(--accent-color); }
  button.accent { background: var(--accent-color); border-color: var(--accent-color); color: #000; font-weight: 600; opacity: 1; }
  :focus-visible { outline: 2px solid var(--accent-color); outline-offset: 2px; }

  /* ---- カメラ列 ×（ライブ / マスク / 合成）マトリクス ---- */
  #grid {
    display: grid; gap: 12px; padding: 12px;
    grid-template-columns: repeat(auto-fit, minmax(min(340px, 100%), 1fr));
    align-items: start;
  }
  .cam { background: transparent; border: 1px solid var(--line-soft); display: flex; flex-direction: column; }
  .cam .bar {
    display: flex; align-items: center; gap: 6px; padding: 7px 10px; font-size: 12px;
    border-bottom: 1px solid var(--line-soft); flex-wrap: wrap;
  }
  .cam .bar .name { font-weight: 600; letter-spacing: .06em; white-space: nowrap; }
  .cam .bar .status { margin-left: auto; opacity: var(--opacity-mute); font-size: 11px; letter-spacing: .08em; }
  .cam .bar .status.ok { color: var(--accent-color); opacity: 1; }
  .cam .bar .status.ng { color: var(--danger-color); opacity: 1; }
  .cam input {
    background: transparent; color: var(--text-color);
    border: none; border-bottom: 1px solid var(--line-input); border-radius: 0;
    padding: 2px 2px; font-size: 11px; font-family: monospace; outline: none;
  }
  .cam input:focus { border-bottom-color: var(--accent-color); }
  .cam input::placeholder { color: var(--text-color); opacity: var(--opacity-mute); }
  .cam input.host { width: 104px; }
  .cam input.auth { width: 80px; }
  .cam input.port { width: 42px; }

  .tile { position: relative; border-bottom: 1px solid var(--line-soft); }
  .tile .tag {
    position: absolute; top: 6px; left: 8px; z-index: 2;
    font-size: 9px; letter-spacing: .15em; text-transform: uppercase;
    color: var(--text-color); opacity: var(--opacity-sub);
    background: rgba(0, 0, 0, 0.55); padding: 2px 6px; pointer-events: none;
  }
  .tile img, .tile canvas {
    display: block; width: 100%; aspect-ratio: 16 / 9; background: #000;
  }
  .tile canvas.mask-canvas { cursor: crosshair; touch-action: none; }

  /* ツール行（マスク段の直下） */
  .tools {
    display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
    padding: 6px 8px; border-bottom: 1px solid var(--line-soft);
  }
  .tools button { padding: 3px 7px; font-size: 11px; }
  .tools .slider { display: flex; align-items: center; gap: 4px; font-size: 10px; opacity: var(--opacity-sub); }
  .tools .slider input[type=range] { width: 64px; accent-color: var(--accent-color); }

  /* cue 設定（列の最下段） */
  .cue-box { display: flex; flex-direction: column; gap: 6px; padding: 8px 10px 10px; }
  .cue-box .label {
    font-size: 9px; text-transform: uppercase; letter-spacing: .15em;
    opacity: var(--opacity-mute);
  }
  .cue-box .rowflex { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .cue-box select {
    flex: 1; min-width: 120px; background: transparent; color: var(--text-color);
    border: none; border-bottom: 1px solid var(--line-input); padding: 3px 2px;
    font-size: 11px; font-family: inherit; outline: none;
  }
  .cue-box select option { background: #111; color: var(--text-color); }
  .cue-box input[type=text] { flex: 1; min-width: 110px; width: auto; }
  .cue-box .check { display: flex; align-items: center; gap: 4px; font-size: 11px; white-space: nowrap; }
  .cue-box .check input { accent-color: var(--accent-color); }
  .cue-box .slider { display: flex; align-items: center; gap: 4px; font-size: 10px; opacity: var(--opacity-sub); white-space: nowrap; }
  .cue-box .slider input[type=range] { width: 70px; accent-color: var(--accent-color); }
  .cue-box .ed-status { font-size: 11px; opacity: var(--opacity-sub); min-height: 1.2em; }
  .cue-box .ed-status.err { color: var(--danger-color); opacity: 1; }
  .cue-box .ed-status.ok { color: var(--accent-color); opacity: 1; }
</style>
</head>
<body>
<header>
  <h1>📡 マルチカメラビュー</h1>
  <span class="hint">列=カメラ。上から ライブ / 白黒マスク（描いて指定: 白=差し替え） / 合成プレビュー。素材を選んで cue 保存 → コンソール/Unity で発火。</span>
  <button id="reloadAll" style="margin-left:auto">🔄 全再接続</button>
</header>
<div id="grid"></div>
<script>
const DEFAULTS = [
  { name: 'Phone01 / iPhone 13 Pro', host: '192.168.11.22', port: 8081, auth: 'admin:admin' },
  { name: 'Phone02 / Pixel 7a',      host: '192.168.11.9',  port: 8080, auth: '' },
  { name: 'Phone03 / Pixel 7 Pro',   host: '192.168.11.27', port: 8080, auth: '' },
];
const LS_KEY = 'multicam.cams.v1';
// MJPEG はメインポート+1 から取る（同一オリジン 6 接続制限の回避。capture-server.py が両方 listen）
const streamBase = () => `${location.protocol}//${location.hostname}:${(parseInt(location.port, 10) || 80) + 1}`;
let cams;
try { cams = JSON.parse(localStorage.getItem(LS_KEY)) || DEFAULTS; } catch { cams = DEFAULTS; }
if (!Array.isArray(cams) || cams.length !== DEFAULTS.length) cams = DEFAULTS;

// show.json のカメラ id（A/B/C）。パネル index で対応付ける（コンソールと同じ並び前提）
let stateCamIds = ['A', 'B', 'C'];
fetch('/state').then(r => r.json()).then(s => {
  if (Array.isArray(s.cameras) && s.cameras.length) stateCamIds = s.cameras.map(c => c.id);
}).catch(() => {});

// captures/ の素材一覧（全列共有）
let captureItems = [];
async function refreshCaptures() {
  try { captureItems = await (await fetch('/captures/list')).json(); } catch { captureItems = []; }
  document.querySelectorAll('select.src-select').forEach(populateSourceSelect);
}
function populateSourceSelect(sel) {
  const cur = sel.value;
  sel.innerHTML = '<option value="">（captures/ から素材を選ぶ）</option>';
  for (const it of captureItems) {
    const o = document.createElement('option');
    o.value = it.url;
    o.textContent = `${it.type === 'video' ? '🎞' : '🖼'} ${it.name}`;
    sel.appendChild(o);
  }
  sel.value = cur;
}

function maskSlug(camId) {
  const t = new Date();
  const pad = (n) => String(n).padStart(2, '0');
  return `cue_${camId}_${t.getFullYear()}${pad(t.getMonth() + 1)}${pad(t.getDate())}_${pad(t.getHours())}${pad(t.getMinutes())}${pad(t.getSeconds())}`;
}
const isVideoUrl = (u) => /\.(webm|mp4|mov|m4v)(\?|$)/i.test(u);

const grid = document.getElementById('grid');
const panels = cams.map((cam, i) => {
  const div = document.createElement('div');
  div.className = 'cam';
  div.innerHTML = `
    <div class="bar">
      <span class="name">${cam.name}</span>
      <input class="host" value="${cam.host}" title="IP">
      <input class="port" value="${cam.port}" title="port">
      <input class="auth" value="${cam.auth}" placeholder="user:pass" title="Basic 認証（空=なし）">
      <button class="re" title="再接続">🔄</button>
      <span class="status">接続中…</span>
    </div>
    <div class="tile"><span class="tag">Live</span><img alt="${cam.name}"></div>
    <div class="tile"><span class="tag">Mask — 白=差し替え</span><canvas class="mask-canvas"></canvas></div>
    <div class="tools">
      <button data-tool="rect" class="on">▭</button>
      <button data-tool="brush">🖌</button>
      <button data-tool="erase">⌫</button>
      <span class="slider"><input type="range" class="brush-size" min="8" max="120" value="40" title="ブラシサイズ"></span>
      <button data-fill="left">◧</button>
      <button data-fill="right">◨</button>
      <button data-fill="top">⬒</button>
      <button data-fill="bottom">⬓</button>
      <button data-fill="all">■</button>
      <button class="mask-invert" title="反転">⇄</button>
      <button class="mask-clear" title="クリア">✕</button>
    </div>
    <div class="tile"><span class="tag">Composite — 合成プレビュー</span><canvas class="comp-canvas" width="640" height="360"></canvas></div>
    <div class="cue-box">
      <span class="label">差し替え素材</span>
      <div class="rowflex">
        <select class="src-select"></select>
        <button class="src-refresh" title="captures/ を再読込">↻</button>
      </div>
      <div class="rowflex">
        <input type="text" class="src-url" placeholder="または素材 URL 直書き（/captures/xxx.webm 等）" spellcheck="false">
      </div>
      <div class="rowflex">
        <input type="text" class="cue-name" placeholder="cue 名" spellcheck="false">
        <label class="check"><input type="checkbox" class="cue-loop" checked> ループ</label>
        <span class="slider">fade <input type="range" class="cue-fade" min="0" max="3" step="0.1" value="0.5"><span class="fade-val">0.5s</span></span>
        <button class="cue-save accent">💾 cue 保存</button>
      </div>
      <span class="ed-status"></span>
    </div>`;
  grid.appendChild(div);

  // ---- ライブ接続 -------------------------------------------------------------
  const img = div.querySelector('img');
  // /cam プロキシは ACAO:* を返すので CORS 画像として読み込む
  // （無印だと別ポート由来で合成 canvas が taint され getImageData 系が全滅する）
  img.crossOrigin = 'anonymous';
  const status = div.querySelector('.status');
  let retryTimer = null;

  function connect() {
    clearTimeout(retryTimer);
    cam.host = div.querySelector('.host').value.trim();
    cam.port = parseInt(div.querySelector('.port').value, 10) || 8080;
    cam.auth = div.querySelector('.auth').value.trim();
    localStorage.setItem(LS_KEY, JSON.stringify(cams));
    pushCameras(); // IP の正は show.json（Quest 実機が参照する）。localStorage は初期表示用フォールバック
    status.textContent = '接続中…'; status.className = 'status';
    // 再接続でキャッシュされた壊れストリームを掴まないよう nonce を付ける
    img.src = `${streamBase()}/cam?host=${encodeURIComponent(cam.host)}&port=${cam.port}&path=/video` +
              (cam.auth ? `&auth=${encodeURIComponent(cam.auth)}` : '') + `&t=${Date.now()}`;
  }
  img.addEventListener('load', () => { status.textContent = '● LIVE'; status.className = 'status ok'; });
  img.addEventListener('error', () => {
    status.textContent = '✕ 切断 — 5s 後に再試行'; status.className = 'status ng';
    retryTimer = setTimeout(connect, 5000);
  });
  div.querySelector('.re').addEventListener('click', connect);
  connect();

  // ---- 白黒マスク段（直接描画。白=差し替え = Unity _MaskTex と同じ向き）---------
  const MW = 640, MH = 360;
  const maskCanvas = div.querySelector('.mask-canvas');
  maskCanvas.width = MW; maskCanvas.height = MH;
  const mctx = maskCanvas.getContext('2d', { willReadFrequently: true });
  mctx.fillStyle = '#000'; mctx.fillRect(0, 0, MW, MH);
  let maskDirty = true; // 合成段の alpha マスク再生成フラグ

  let tool = 'rect';
  let dragging = false, dragStart = null, dragCur = null;

  function localPos(ev) {
    const r = maskCanvas.getBoundingClientRect();
    return { x: (ev.clientX - r.left) / r.width * MW, y: (ev.clientY - r.top) / r.height * MH };
  }
  function paintBrush(p, erase) {
    const r = maskCanvas.getBoundingClientRect();
    const size = parseInt(div.querySelector('.brush-size').value, 10) / r.width * MW;
    mctx.fillStyle = erase ? '#000' : '#fff';
    mctx.beginPath();
    mctx.arc(p.x, p.y, size / 2, 0, Math.PI * 2);
    mctx.fill();
    maskDirty = true;
  }
  // 矩形ドラッグ中のラバーバンドは putImageData で元に戻してから描く
  let rectSnapshot = null;
  maskCanvas.addEventListener('pointerdown', (ev) => {
    try { maskCanvas.setPointerCapture(ev.pointerId); } catch { /* 合成イベント等 */ }
    dragging = true; dragStart = dragCur = localPos(ev);
    if (tool === 'rect') rectSnapshot = mctx.getImageData(0, 0, MW, MH);
    else paintBrush(dragCur, tool === 'erase');
  });
  maskCanvas.addEventListener('pointermove', (ev) => {
    if (!dragging) return;
    dragCur = localPos(ev);
    if (tool === 'rect') {
      mctx.putImageData(rectSnapshot, 0, 0);
      mctx.strokeStyle = '#fff'; mctx.lineWidth = 2; mctx.setLineDash([6, 4]);
      mctx.strokeRect(Math.min(dragStart.x, dragCur.x), Math.min(dragStart.y, dragCur.y),
                      Math.abs(dragCur.x - dragStart.x), Math.abs(dragCur.y - dragStart.y));
      mctx.setLineDash([]);
    } else {
      paintBrush(dragCur, tool === 'erase');
    }
  });
  maskCanvas.addEventListener('pointerup', () => {
    if (dragging && tool === 'rect' && dragStart && dragCur && rectSnapshot) {
      mctx.putImageData(rectSnapshot, 0, 0);
      mctx.fillStyle = '#fff';
      mctx.fillRect(Math.min(dragStart.x, dragCur.x), Math.min(dragStart.y, dragCur.y),
                    Math.abs(dragCur.x - dragStart.x), Math.abs(dragCur.y - dragStart.y));
      maskDirty = true;
    }
    dragging = false; dragStart = dragCur = null; rectSnapshot = null;
  });

  div.querySelectorAll('[data-tool]').forEach((b) => {
    b.addEventListener('click', () => {
      tool = b.dataset.tool;
      div.querySelectorAll('[data-tool]').forEach((x) => x.classList.toggle('on', x === b));
    });
  });
  div.querySelectorAll('[data-fill]').forEach((b) => {
    b.addEventListener('click', () => {
      const f = b.dataset.fill;
      mctx.fillStyle = '#fff';
      if (f === 'all') mctx.fillRect(0, 0, MW, MH);
      if (f === 'left') mctx.fillRect(0, 0, MW / 2, MH);
      if (f === 'right') mctx.fillRect(MW / 2, 0, MW / 2, MH);
      if (f === 'top') mctx.fillRect(0, 0, MW, MH / 2);
      if (f === 'bottom') mctx.fillRect(0, MH / 2, MW, MH / 2);
      maskDirty = true;
    });
  });
  div.querySelector('.mask-invert').addEventListener('click', () => {
    const d = mctx.getImageData(0, 0, MW, MH);
    for (let k = 0; k < d.data.length; k += 4) {
      d.data[k] = 255 - d.data[k]; d.data[k + 1] = 255 - d.data[k + 1]; d.data[k + 2] = 255 - d.data[k + 2];
    }
    mctx.putImageData(d, 0, 0);
    maskDirty = true;
  });
  div.querySelector('.mask-clear').addEventListener('click', () => {
    mctx.fillStyle = '#000'; mctx.fillRect(0, 0, MW, MH);
    maskDirty = true;
  });

  // ---- 差し替え素材のロード -----------------------------------------------------
  let srcMedia = null;   // HTMLVideoElement | HTMLImageElement | null
  let srcReady = false;
  function loadSource(url) {
    if (srcMedia && srcMedia.tagName === 'VIDEO') { srcMedia.pause(); srcMedia.src = ''; }
    srcMedia = null; srcReady = false;
    if (!url) return;
    if (isVideoUrl(url)) {
      const v = document.createElement('video');
      v.muted = true; v.loop = true; v.playsInline = true; v.crossOrigin = 'anonymous';
      v.src = url;
      v.addEventListener('canplay', () => { srcReady = true; v.play().catch(() => {}); });
      srcMedia = v;
    } else {
      const im = new Image();
      im.crossOrigin = 'anonymous';
      im.onload = () => { srcReady = true; };
      im.src = url;
      srcMedia = im;
    }
  }
  const srcSelect = div.querySelector('.src-select');
  const srcUrl = div.querySelector('.src-url');
  srcSelect.addEventListener('change', () => { srcUrl.value = ''; loadSource(srcSelect.value); });
  srcUrl.addEventListener('change', () => { loadSource(srcUrl.value.trim()); });
  div.querySelector('.src-refresh').addEventListener('click', refreshCaptures);

  // ---- 合成プレビュー段（ライブ + マスク切り抜き素材、RAF 合成）-----------------
  const comp = div.querySelector('.comp-canvas');
  const cctx = comp.getContext('2d');
  // 素材をマスクで切り抜くための作業バッファ
  const cut = document.createElement('canvas');
  cut.width = MW; cut.height = MH;
  const cutCtx = cut.getContext('2d');
  // マスク（白=不透明）の alpha 版。maskDirty の時だけ作り直す
  const alphaMask = document.createElement('canvas');
  alphaMask.width = MW; alphaMask.height = MH;
  const amCtx = alphaMask.getContext('2d');
  function rebuildAlphaMask() {
    const md = mctx.getImageData(0, 0, MW, MH);
    const ad = amCtx.createImageData(MW, MH);
    for (let k = 0; k < md.data.length; k += 4) {
      ad.data[k] = 255; ad.data[k + 1] = 255; ad.data[k + 2] = 255;
      ad.data[k + 3] = md.data[k]; // 白=不透明 / 黒=透明
    }
    amCtx.putImageData(ad, 0, 0);
    maskDirty = false;
  }
  function drawContain(ctx, media, w, h) {
    const mw = media.videoWidth || media.naturalWidth || w;
    const mh = media.videoHeight || media.naturalHeight || h;
    const s = Math.min(w / mw, h / mh);
    const dw = mw * s, dh = mh * s;
    ctx.drawImage(media, (w - dw) / 2, (h - dh) / 2, dw, dh);
  }
  function renderComposite() {
    cctx.fillStyle = '#000'; cctx.fillRect(0, 0, MW, MH);
    // ライブ（contain。Unity 側の letterbox と同じ見え方）
    if (img.naturalWidth) drawContain(cctx, img, MW, MH);
    // 素材をスクリーン枠全面に引き伸ばし、マスク白領域だけ残して重ねる（Unity ScreenComposite と同じモデル）
    if (srcMedia && srcReady) {
      if (maskDirty) rebuildAlphaMask();
      cutCtx.clearRect(0, 0, MW, MH);
      cutCtx.drawImage(srcMedia, 0, 0, MW, MH);
      cutCtx.globalCompositeOperation = 'destination-in';
      cutCtx.drawImage(alphaMask, 0, 0);
      cutCtx.globalCompositeOperation = 'source-over';
      cctx.drawImage(cut, 0, 0);
    }
  }
  // RAF ではなく setInterval（非表示タブで RAF は完全停止するが、interval は
  // 1Hz に間引かれつつ動き続ける）。3 列 × 640x360 の 2D 合成なら 30fps で余裕
  setInterval(renderComposite, 33);

  // ---- cue 保存 -----------------------------------------------------------------
  const fadeRange = div.querySelector('.cue-fade');
  fadeRange.addEventListener('input', () => {
    div.querySelector('.fade-val').textContent = parseFloat(fadeRange.value).toFixed(1) + 's';
  });
  const edStatus = (msg, cls = '') => {
    const el = div.querySelector('.ed-status');
    el.textContent = msg; el.className = 'ed-status ' + cls;
  };
  function maskIsEmpty() {
    const d = mctx.getImageData(0, 0, MW, MH).data;
    for (let k = 0; k < d.length; k += 4) if (d[k] > 8) return false;
    return true;
  }
  div.querySelector('.cue-save').addEventListener('click', async () => {
    const camId = stateCamIds[i] || ['A', 'B', 'C'][i];
    const sourceUrl = (srcUrl.value.trim() || srcSelect.value || '').trim();
    if (!sourceUrl) return edStatus('差し替え素材を選んで（or URL 直書き）', 'err');
    const name = div.querySelector('.cue-name').value.trim() || `cue ${camId} ${new Date().toLocaleTimeString()}`;
    const id = maskSlug(camId);
    try {
      let maskUrl = '';
      if (!maskIsEmpty()) {
        edStatus('マスク書き出し中…');
        // マスクは白=差し替えでそのまま Unity _MaskTex 形式（反転不要）
        const blob = await new Promise((r) => maskCanvas.toBlob(r, 'image/png'));
        const res = await (await fetch(`/masks?name=${encodeURIComponent(id)}`, { method: 'POST', body: blob })).json();
        if (!res.ok) throw new Error(res.error || 'マスク保存失敗');
        maskUrl = res.url;
      }
      const fade = parseFloat(fadeRange.value) || 0.5;
      const cue = {
        id, name, camera: camId, maskUrl, sourceUrl,
        strength: 1, loop: div.querySelector('.cue-loop').checked,
        fadeIn: fade, fadeOut: fade,
      };
      const s = await (await fetch('/state')).json();
      const cues = s.cues || [];
      const k = cues.findIndex((c) => c.id === id);
      if (k >= 0) cues[k] = cue; else cues.push(cue);
      const res2 = await (await fetch('/state', { method: 'POST', body: JSON.stringify({ cues }) })).json();
      if (!res2.ok) throw new Error(res2.error || 'state 保存失敗');
      edStatus(`✓ cue「${name}」保存（カメラ ${camId}${maskUrl ? ' / マスク付き' : ' / 全面差し替え'}）。コンソールから発火できる`, 'ok');
    } catch (e) {
      edStatus('保存失敗: ' + e.message, 'err');
    }
  });

  return { connect };
});
document.getElementById('reloadAll').addEventListener('click', () => panels.forEach(p => p.connect()));
refreshCaptures();

// IP の正は show.json（console タブ・Quest 実機と共有）。起動時に show.json の host/port/auth を
// 入力欄へ反映してから接続し、以後の編集は show.json へ書き戻す（localStorage は初期フォールバック）。
async function syncFromState() {
  try {
    const s = await (await fetch('/state')).json();
    if (!Array.isArray(s.cameras) || !s.cameras.length) return;
    stateCamIds = s.cameras.map((c) => c.id);
    s.cameras.forEach((c, i) => {
      const panel = grid.children[i];
      if (!panel) return;
      if (c.host) panel.querySelector('.host').value = c.host;
      if (c.port) panel.querySelector('.port').value = c.port;
      panel.querySelector('.auth').value = c.auth || '';
    });
    panels.forEach((p) => p.connect());
  } catch { /* サーバ未接続なら localStorage 値のまま */ }
}
let pushTimer = 0;
function pushCameras() {
  clearTimeout(pushTimer);
  pushTimer = setTimeout(async () => {
    try {
      const s = await (await fetch('/state')).json();
      const arr = Array.isArray(s.cameras) ? s.cameras : [];
      cams.forEach((cam, i) => {
        if (!arr[i]) arr[i] = { id: stateCamIds[i] || ['A', 'B', 'C'][i] };
        arr[i].host = cam.host; arr[i].port = cam.port; arr[i].auth = cam.auth;
      });
      await fetch('/state', { method: 'POST', body: JSON.stringify({ cameras: arr }) });
    } catch { /* オフラインなら show.json へは書けない（次回 connect で再試行）*/ }
  }, 200);
}
syncFromState();
</script>
