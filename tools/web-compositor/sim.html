<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仮想 Unity — 廻リ視 show simulator</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .sim-wrap { display: flex; flex-direction: column; height: 100vh; }
    .sim-stage { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; min-height: 0; }
    #simCanvas { max-width: 96%; max-height: 92%; border: 1px solid var(--line); background: #000; }
    .sim-bar { display: flex; align-items: center; gap: 12px; padding: 8px 16px; background: var(--panel); border-top: 1px solid var(--line); font-size: 12px; }
    .sim-bar .spacer { flex: 1; }
  </style>
</head>
<body>
  <div class="sim-wrap">
    <header>
      <h1>🖥 仮想 Unity（show simulator）</h1>
    <span class="status">Quest の代役。show.json を long-poll → ScreenComposite 相当の合成を canvas で再現 → heartbeat 送信</span>
    </header>
    <div class="sim-stage">
      <canvas id="simCanvas" width="1280" height="720"></canvas>
    </div>
    <div class="sim-bar">
      <span id="simState">state: …</span>
      <span id="simCue"></span>
      <span class="spacer"></span>
      <span class="hint">⚠ 本物の Unity と同時に動かすと heartbeat を取り合う。Unity 検証中はこのタブを閉じる。</span>
    </div>
  </div>
  <script type="module" src="sim.js"></script>
</body>
</html>
